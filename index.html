<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Secure App</title>
    <style>
        /* Basic mobile-friendly styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
        }
        h1 {
            margin-top: 0;
            color: #2d3748;
        }
        p {
            color: #718096;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome to the App</h1>
        <p>This is your secure, mobile-friendly landing page. The frontend is completely separated from the database!</p>
        <button class="btn" onclick="testBackend()">Test Connection</button>
        <p id="status-message" style="margin-top: 15px; font-weight: bold;"></p>
    </div>

    <script>
        // We will add the logic to talk to your Render backend here later!
        function testBackend() {
            document.getElementById('status-message').innerText = "Frontend is ready to connect!";
            document.getElementById('status-message').style.color = "#3182ce";
        }
    </script>

</body>
</html>
